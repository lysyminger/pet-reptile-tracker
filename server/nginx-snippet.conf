# 把这段加到 api.lysyminger.online 站点的 Nginx 配置里
# 宝塔操作路径：网站 → api.lysyminger.online → 设置 → 配置文件
# 把下面的 location 块插到 server { ... } 内部
# 已存在的 location / 块要删掉或保留都行（我们的请求都走 /api/）

# 所有 /api/* 请求都打到 index.php
location /api/ {
    try_files $uri /index.php?$query_string;
}

# 上传的文件静态对外
location /uploads/ {
    alias /www/wwwroot/api.lysyminger.online/uploads/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

# 禁止外部直接访问 .env 等敏感文件
location ~ /\.(env|git|ht) {
    deny all;
    return 404;
}
location ~ /(config|lib|routes|migrations)/ {
    deny all;
    return 404;
}

# 文件上传体积上限（5MB 头像）
client_max_body_size 5m;
